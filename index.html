<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Student Login - Neema Peter- 77366</title>

<!-- Better modern font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

/* PAGE LAYOUT */

body{
height:100vh;
display:flex;
}

/* LEFT LOGIN PANEL */

.left{
width:40%;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

/* FORM CONTAINER */

.form-container{
width:100%;
max-width:380px;
}

.form-container h2{
margin-bottom:10px;
font-weight:600;
font-size:28px;
}

.form-container p{
margin-bottom:30px;
color:#ccc;
}

/* FORM INPUTS */

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:18px;
background:none;
border:none;
border-bottom:1px solid #555;
color:white;
font-size:14px;
}

input:focus{
outline:none;
border-bottom:1px solid #a855f7;
}

/* ERROR MESSAGES */

.error{
color:#ff6b6b;
font-size:12px;
margin-bottom:10px;
display:none;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

/* SUCCESS MESSAGE */

#successMessage{
display:none;
font-size:20px;
text-align:center;
color:#22c55e;
margin-top:20px;
}

/* RIGHT PANEL */

.right{
width:60%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start;
text-align:left;
color:white;
padding:80px;

/* background image + lighter purple overlay */

background:
linear-gradient(rgba(139,92,246,0.55), rgba(168,85,247,0.55)),
url("download.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* WELCOME TEXT */

.welcome-title{
font-size:52px;
font-weight:700;
line-height:1.2;
max-width:500px;
margin-bottom:20px;
animation:fadeUp 1.5s ease;
}

.welcome-sub{
font-size:18px;
font-weight:300;
opacity:0.9;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<!-- LEFT LOGIN FORM -->

<div class="left">

<div class="form-container">

<h2>Student Login</h2>
<p>Enter your account details</p>

<form id="loginForm">

<label>First Name</label>
<input type="text" id="firstName">
<div class="error" id="firstNameError">First name required</div>

<label>Last Name</label>
<input type="text" id="lastName">
<div class="error" id="lastNameError">Last name required</div>

<label>Email</label>
<input type="email" id="email">
<div class="error" id="emailError">Valid email required</div>

<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError">Password must be 6+ characters</div>

<label>Student ID</label>
<input type="text" id="studentId">
<div class="error" id="studentIdError">Student ID required</div>

<button type="submit">Login</button>

</form>

<div id="successMessage">
Login Successful! Welcome to the Student Portal.
</div>

</div>

</div>

<!-- RIGHT SIDE WELCOME PANEL -->

<div class="right">

<h1 class="welcome-title">
Welcome to <br>Student Portal
</h1>

<p class="welcome-sub">
Login to access your account
</p>

</div>

<script>

/*
Form validation script
Prevents form submission if fields are invalid
Displays field specific error messages
*/

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let valid=true;

let firstName=document.getElementById("firstName").value.trim();
let lastName=document.getElementById("lastName").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
let studentId=document.getElementById("studentId").value.trim();

/* FIRST NAME */

if(firstName===""){
document.getElementById("firstNameError").style.display="block";
valid=false;
}else{
document.getElementById("firstNameError").style.display="none";
}

/* LAST NAME */

if(lastName===""){
document.getElementById("lastNameError").style.display="block";
valid=false;
}else{
document.getElementById("lastNameError").style.display="none";
}

/* EMAIL */

let emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){
document.getElementById("emailError").style.display="block";
valid=false;
}else{
document.getElementById("emailError").style.display="none";
}

/* PASSWORD */

if(password.length<6){
document.getElementById("passwordError").style.display="block";
valid=false;
}else{
document.getElementById("passwordError").style.display="none";
}

/* STUDENT ID */

if(studentId===""){
document.getElementById("studentIdError").style.display="block";
valid=false;
}else{
document.getElementById("studentIdError").style.display="none";
}

/* IF FORM VALID */

if(valid){

document.getElementById("loginForm").reset();

document.getElementById("loginForm").style.display="none";

document.getElementById("successMessage").style.display="block";

}

});

</script>

</body>
</html>
